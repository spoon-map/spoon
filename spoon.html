<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spoon &mdash; Skip the algorithm. Trust a Spoon.</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 80'%3E%3Cpath d='M14 3 C21.5 2.5,26 9,26 16.5 C26 25.5,20.5 31,16 32.5 L16.8 70.5 C17 74,15.5 77.5,14 77.5 C12.5 77.5,11 74,11.2 70.5 L12 32.5 C7.5 31,2 25.5,2 16.5 C2 9,6.5 2.5,14 3 Z' fill='%23111' stroke='%23111' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#fff; color:#111; height:100vh; overflow:hidden; }

    :root {
      --hdr: 54px;
      --cat: 48px;
      --top: 102px; /* --hdr + --cat */
    }

    /* ── HEADER ── */
    .header {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      background:#fff; border-bottom:1.5px solid #111;
      height:var(--hdr);
    }
    .header-row1 {
      display:flex; align-items:center; gap:16px;
      padding:0 20px; height:54px;
    }
    .logo-wrap-inner { display:flex; align-items:center; gap:7px; }
    .logo { font-family:'Caveat',cursive; font-size:28px; font-weight:700; letter-spacing:-0.5px; white-space:nowrap; }
    .logo-icon { display:flex; align-items:center; flex-shrink:0; }
    .tagline { font-size:11px; color:#aaa; white-space:nowrap; display:none; }
    @media(min-width:900px){ .tagline{ display:block; } }

    /* Search */
    .search-wrap-desktop { flex:1; max-width:420px; position:relative; }
    .search-wrap-mobile { display:none; }
    .search-input {
      width:100%; border:1.5px solid #ddd; padding:8px 14px 8px 36px;
      font-family:'Inter',sans-serif; font-size:13px; outline:none;
      background:#fafafa; transition:border-color 0.15s;
    }
    .search-input:focus { border-color:#111; background:#fff; }
    .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:14px; color:#aaa; pointer-events:none; }
    .search-dropdown {
      position:absolute; top:calc(100% + 4px); left:0; right:0;
      background:#fff; border:1.5px solid #111; box-shadow:3px 3px 0 #111;
      z-index:2100; display:none; max-height:300px; overflow-y:auto;
    }
    .search-dropdown.open { display:block; }
    .search-result { padding:10px 14px; cursor:pointer; border-bottom:1px solid #f0f0f0; display:flex; flex-direction:column; gap:2px; }
    .search-result:last-child { border-bottom:none; }
    .search-result:hover { background:#f7f7f7; }
    .search-result-name { font-family:'Caveat',cursive; font-size:17px; font-weight:600; }
    .search-result-addr { font-size:11px; color:#aaa; }
    .search-result-tag { font-size:11px; color:#888; }
    .search-in-spoon { color:#111; }
    .search-new { color:#bbb; font-style:italic; }
    .search-loading { padding:12px 14px; font-size:16px; color:#aaa; font-family:'Caveat',cursive; }

    /* User pill */
    .user-pill { display:flex; align-items:center; gap:8px; border:1.5px solid #111; padding:4px 12px 4px 7px; white-space:nowrap; flex-shrink:0; }
    .header-spoon-wrap { width:14px; }
    .user-info-name { font-family:'Caveat',cursive; font-size:14px; line-height:1.1; }
    .user-info-loc { font-size:10px; color:#888; }

    /* ── CATEGORY BAR ── */
    .category-bar {
      position:fixed; top:var(--hdr); left:0; right:0; z-index:990;
      background:#fff; border-bottom:1.5px solid #eee;
      height:var(--cat); display:flex; align-items:center;
      gap:8px; padding:0 14px;
      overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;
      white-space:nowrap;
    }
    .category-bar::-webkit-scrollbar { display:none; }
    .cat-chip {
      flex-shrink:0; padding:6px 14px; border:1.5px solid #ddd;
      font-family:'Caveat',cursive; font-size:15px; cursor:pointer;
      background:#fff; color:#888; border-radius:20px; transition:all 0.12s;
    }
    .cat-chip:hover { border-color:#aaa; color:#111; }
    .cat-chip.active { background:#111; color:#fff; border-color:#111; }

    /* ── LAYOUT ── */
    #map { position:fixed; top:var(--top); left:260px; right:0; bottom:0; z-index:1; transition:left 0.3s ease; }
    #map.panel-hidden { left:0; }

    /* ── LEFT PANEL ── */
    .left-panel {
      position:fixed; top:var(--top); left:0; width:260px; bottom:0;
      background:#fff; border-right:1.5px solid #111;
      z-index:400; display:flex; flex-direction:column;
      overflow:hidden; transition:left 0.3s ease;
    }
    .left-panel.hidden { left:-262px; }

    .panel-toggle-btn {
      position:fixed; top:calc(var(--top) + 8px); left:260px; z-index:600;
      background:#fff; border:1.5px solid #111; border-left:none;
      width:auto; min-width:22px; height:40px; padding:0 11px;
      display:flex; align-items:center; justify-content:center; gap:5px;
      cursor:pointer; font-size:14px; color:#888;
      font-family:'Caveat',cursive; white-space:nowrap; letter-spacing:0.2px;
      transition:left 0.3s ease; box-shadow:2px 2px 0 #111;
    }
    .panel-toggle-btn.hidden { left:0; border-left:1.5px solid #111; }
    .panel-toggle-btn:hover { background:#f5f5f5; color:#111; }

    /* Add Place FAB — moved left of zoom controls */
    .add-place-fab {
      position:fixed; bottom:80px; right:14px; z-index:600;
      background:#111; color:#fff; border:none;
      width:46px; height:46px; border-radius:50%;
      font-size:28px; font-weight:300; cursor:pointer;
      box-shadow:3px 3px 0 #555; display:none;
      align-items:center; justify-content:center; line-height:1;
      transition:background 0.15s;
    }
    .add-place-fab.visible { display:flex; }
    .add-place-fab:hover { background:#333; }

    .left-panel-header { padding:16px 16px 12px; border-bottom:1px solid #eee; }
    .left-panel-title { font-family:'Caveat',cursive; font-size:22px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
    .left-panel-close { background:none; border:none; font-size:16px; color:#bbb; cursor:pointer; line-height:1; }
    .left-panel-close:hover { color:#111; }

    /* ── MOBILE ── */
    @media(max-width:700px) {
      :root { --hdr: 108px; --top: 156px; }
      .header { height:auto !important; flex-wrap:wrap; padding:0 !important; gap:0 !important; row-gap:0; border-bottom:none !important; }
      .header-row1 { display:flex; align-items:center; width:100%; height:50px; padding:0 14px; gap:10px; border-bottom:1px solid #eee; }
      .search-wrap-desktop { display:none !important; }
      .search-wrap-mobile {
        display:block !important; flex:none; max-width:none;
        width:100%; padding:7px 14px 8px; background:#fff;
        border-bottom:1.5px solid #111; position:relative;
      }
      .search-wrap-mobile .search-input { font-size:15px; padding:10px 14px 10px 36px; border-radius:8px; border:1.5px solid #ddd; }
      #map { left:0 !important; }
      .left-panel { box-shadow:4px 0 20px rgba(0,0,0,0.18); z-index:800; }
      .panel-toggle-btn {
        position:fixed !important; top:auto !important; bottom:20px !important; left:14px !important;
        width:auto !important; height:44px !important; border:1.5px solid #111 !important;
        border-radius:22px !important; box-shadow:3px 3px 0 #111 !important; font-size:15px !important;
        background:#fff !important; z-index:900 !important; padding:0 18px !important;
        font-family:'Caveat',cursive !important; letter-spacing:0.3px;
      }
      .side-panel { width:100% !important; right:-100% !important; }
      .side-panel.open { right:0 !important; }
      .add-place-fab { bottom:20px; right:14px; }
    }

    /* ── RANKINGS ── */
    .rank-tabs { display:flex; gap:6px; }
    .rank-tab { flex:1; padding:6px 0; border:1.5px solid #ddd; font-family:'Caveat',cursive; font-size:15px; cursor:pointer; background:#fff; color:#888; text-align:center; transition:all 0.1s; }
    .rank-tab.active { background:#111; color:#fff; border-color:#111; }
    .rank-tab:hover:not(.active) { border-color:#aaa; color:#111; }
    .rank-list { flex:1; overflow-y:auto; padding:8px 0; }
    .rank-item { display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; border-bottom:1px solid #f5f5f5; transition:background 0.1s; }
    .rank-item:hover { background:#fafafa; }
    .rank-item.active-panel { background:#f5f5f5; }
    .rank-num { font-family:'Caveat',cursive; font-size:20px; font-weight:700; color:#ddd; width:22px; flex-shrink:0; text-align:center; }
    .rank-num.top { color:#111; }
    .rank-info { flex:1; min-width:0; }
    .rank-name { font-family:'Caveat',cursive; font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rank-meta { display:flex; align-items:center; gap:6px; margin-top:1px; }
    .rank-visits { font-size:11px; color:#aaa; }
    .rank-spoons-mini { display:flex; gap:1px; }

    /* ── MAP MARKERS ── */
    .marker-wrap { display:flex; flex-direction:column; align-items:flex-start; gap:3px; }
    .marker-label {
      background:#fff; border:1.5px solid #111; border-radius:20px;
      padding:4px 10px; font-family:'Caveat',cursive; font-size:13px; font-weight:600;
      white-space:nowrap; box-shadow:2px 2px 0 #111; cursor:pointer; transition:transform 0.12s;
    }
    .marker-label:hover { transform:scale(1.05); }
    .marker-label.active { background:#111; color:#fff; }
    .gplace-label { background:#f8f8f8; border-color:#bbb; color:#555; box-shadow:1px 1px 0 #bbb; font-size:12px; }
    .marker-spoons-row { display:flex; gap:1px; padding-left:6px; align-items:flex-end; }
    .marker-avatars { display:flex; gap:3px; padding-left:6px; margin-top:1px; }
    .avatar-dot { width:18px; height:18px; border-radius:50%; border:1.5px solid #fff; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; color:#fff; font-family:'Inter',sans-serif; box-shadow:1px 1px 0 #ccc; }
    .active-count-badge { display:inline-flex; align-items:center; justify-content:center; background:#111; color:#fff; border-radius:20px; padding:1px 7px; font-size:11px; font-family:'Caveat',cursive; font-weight:700; margin-left:3px; }

    /* ── RIGHT PANEL ── */
    .side-panel { position:fixed; top:var(--top); right:-390px; width:370px; bottom:0; background:#fff; border-left:1.5px solid #111; z-index:500; overflow-y:auto; transition:right 0.28s ease; }
    .side-panel.open { right:0; }
    .panel-inner { padding:22px 20px; }
    .panel-close { position:absolute; top:14px; right:14px; background:none; border:none; font-size:17px; cursor:pointer; color:#aaa; }
    .panel-close:hover { color:#111; }
    .panel-category { font-size:10px; text-transform:uppercase; letter-spacing:1.8px; color:#aaa; margin-bottom:4px; }
    .panel-name { font-family:'Caveat',cursive; font-size:32px; font-weight:700; line-height:1.05; margin-bottom:5px; }
    .panel-address { font-size:12px; color:#888; margin-bottom:16px; }
    .panel-rating-row { display:flex; align-items:center; gap:10px; padding-bottom:16px; border-bottom:1px solid #eee; margin-bottom:16px; }
    .rating-meta { font-size:12px; color:#aaa; }
    .panel-photo { width:100%; height:160px; background:#f7f7f7; border:1px solid #eee; display:flex; align-items:center; justify-content:center; font-family:'Caveat',cursive; font-size:15px; color:#ccc; margin-bottom:16px; }
    .whos-here { display:flex; align-items:center; gap:8px; margin-bottom:12px; font-size:12px; color:#888; }
    .whos-here-avatars { display:flex; gap:4px; }
    .whos-here .avatar-dot { width:22px; height:22px; font-size:10px; border-color:#eee; }
    .spoon-in-btn { width:100%; background:#111; color:#fff; border:none; padding:13px; font-family:'Caveat',cursive; font-size:19px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px; }
    .spoon-in-btn:hover { background:#333; }
    .spoon-in-btn.checked-in { background:#fff; color:#111; border:1.5px solid #111; }
    .spoon-in-btn.checked-in:hover { background:#f5f5f5; }
    .spoon-in-btn.elsewhere { background:#fff; color:#ccc; border:1.5px solid #eee; cursor:default; }
    .elsewhere-note { font-size:12px; color:#aaa; text-align:center; margin-bottom:12px; }
    .elsewhere-note span { color:#111; text-decoration:underline; cursor:pointer; }
    .chat-btn { width:100%; background:#fff; border:1.5px solid #111; padding:12px 16px; font-family:'Caveat',cursive; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .chat-btn:hover { background:#f5f5f5; }
    .live-badge { display:inline-flex; align-items:center; gap:5px; background:#fff5f5; border:1px solid #ffc0c0; border-radius:20px; padding:3px 9px; font-size:11px; font-family:'Inter',sans-serif; font-weight:600; color:#d00; letter-spacing:0.5px; }
    .live-dot { width:6px; height:6px; background:#d00; border-radius:50%; animation:blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .section-label { font-family:'Caveat',cursive; font-size:15px; color:#bbb; margin-bottom:8px; }
    .review-item { padding:11px 0; border-bottom:1px solid #f2f2f2; }
    .review-item:last-child { border-bottom:none; }
    .review-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
    .review-author { font-family:'Caveat',cursive; font-size:16px; font-weight:600; }
    .review-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:5px; }
    .review-tag { font-size:11px; background:#f5f5f5; padding:2px 7px; color:#666; }
    .review-text { font-size:13px; color:#444; line-height:1.55; }
    .review-must { font-size:12px; color:#888; margin-top:3px; }
    .review-must strong { color:#111; }
    .review-date { font-size:11px; color:#ccc; margin-top:3px; }
    .new-place-banner { background:#fafafa; border:1px solid #eee; padding:14px; margin-bottom:16px; font-size:13px; color:#666; line-height:1.6; }
    .new-place-banner strong { color:#111; font-family:'Caveat',cursive; font-size:16px; display:block; margin-bottom:4px; }
    .rate-form { display:flex; flex-direction:column; gap:14px; }
    .form-label { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:6px; }
    .form-input, .form-textarea { width:100%; border:1px solid #ddd; padding:9px 12px; font-family:'Inter',sans-serif; font-size:13px; outline:none; }
    .form-input:focus, .form-textarea:focus { border-color:#111; }
    .form-textarea { resize:vertical; min-height:70px; }
    .spoon-picker-row { display:flex; gap:5px; align-items:center; }
    .spoon-pick-btn { cursor:pointer; background:none; border:none; padding:2px; opacity:0.2; transition:opacity 0.1s; }
    .spoon-pick-btn.lit { opacity:1; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { padding:5px 11px; border:1.5px solid #ddd; font-family:'Caveat',cursive; font-size:14px; cursor:pointer; background:#fff; color:#888; }
    .chip:hover { border-color:#aaa; color:#111; }
    .chip.selected { background:#111; color:#fff; border-color:#111; }
    .spoon-rating-desc { font-family:'Caveat',cursive; font-size:14px; color:#888; margin-left:6px; }
    .btn-submit { background:#111; color:#fff; border:none; padding:13px; font-family:'Caveat',cursive; font-size:18px; cursor:pointer; width:100%; }
    .btn-submit:hover { background:#333; }
    .form-divider { border:none; border-top:1px solid #eee; }

    /* ── MODALS ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:2000; display:none; align-items:flex-start; justify-content:center; overflow-y:auto; padding:20px 10px; }
    .modal-overlay.open { display:flex; }
    .auth-modal { background:#fff; border:1.5px solid #111; box-shadow:6px 6px 0 #111; width:420px; max-width:96vw; padding:36px 30px 30px; margin:auto; }
    .auth-logo { font-family:'Caveat',cursive; font-size:46px; font-weight:700; line-height:1; margin-bottom:3px; }
    .auth-tagline { font-size:12px; color:#888; margin-bottom:26px; }
    .auth-tabs { display:flex; gap:0; border:1.5px solid #111; margin-bottom:24px; }
    .auth-tab { flex:1; padding:9px 0; font-family:'Caveat',cursive; font-size:17px; cursor:pointer; background:#fff; color:#aaa; border:none; transition:all 0.1s; }
    .auth-tab.active { background:#111; color:#fff; }
    .auth-label { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:7px; color:#888; }
    .auth-input { width:100%; border:1px solid #ddd; padding:10px 13px; font-family:'Inter',sans-serif; font-size:14px; outline:none; margin-bottom:14px; }
    .auth-input:focus { border-color:#111; }
    .auth-btn { width:100%; background:#111; color:#fff; border:none; padding:13px; font-family:'Caveat',cursive; font-size:19px; cursor:pointer; margin-bottom:12px; }
    .auth-btn:hover { background:#333; }
    .auth-btn:disabled { background:#ccc; cursor:not-allowed; }
    .auth-divider { display:flex; align-items:center; gap:10px; margin:14px 0; color:#ccc; font-size:12px; }
    .auth-divider::before, .auth-divider::after { content:''; flex:1; border-top:1px solid #eee; }
    .auth-google-btn { width:100%; background:#fff; border:1.5px solid #ddd; padding:11px; font-family:'Inter',sans-serif; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px; transition:border-color 0.1s; }
    .auth-google-btn:hover { border-color:#111; }
    .auth-error { font-size:13px; color:#c00; margin-bottom:12px; display:none; background:#fff5f5; padding:8px 11px; border-left:3px solid #c00; }
    .auth-error.visible { display:block; }
    .color-grid { display:flex; gap:9px; flex-wrap:wrap; margin-bottom:20px; }
    .color-swatch { width:34px; height:34px; border-radius:50%; cursor:pointer; border:2.5px solid transparent; transition:transform 0.1s, border-color 0.1s; }
    .color-swatch:hover { transform:scale(1.1); }
    .color-swatch.selected { border-color:#111; transform:scale(1.12); }
    .spoon-preview-row { display:flex; align-items:center; gap:16px; padding:14px; border:1px solid #eee; margin-bottom:20px; }
    .preview-spoon-wrap { width:26px; }
    .preview-text { font-family:'Caveat',cursive; font-size:15px; color:#888; }
    .preview-name { font-family:'Caveat',cursive; font-size:19px; font-weight:600; }
    .logout-btn { font-size:12px; color:#aaa; background:none; border:none; cursor:pointer; padding:0 4px; }
    .logout-btn:hover { color:#111; }

    /* ── CHAT ── */
    .chat-modal { background:#fff; border:1.5px solid #111; box-shadow:5px 5px 0 #111; width:420px; max-width:95vw; height:560px; display:flex; flex-direction:column; }
    .chat-modal-header { padding:14px 18px; border-bottom:1.5px solid #111; display:flex; align-items:flex-start; justify-content:space-between; }
    .chat-place-name { font-family:'Caveat',cursive; font-size:23px; font-weight:700; line-height:1; }
    .chat-meta { font-size:11px; color:#aaa; margin-top:3px; }
    .chat-header-right { display:flex; align-items:center; gap:10px; }
    .chat-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:12px; }
    .msg-system { text-align:center; font-family:'Caveat',cursive; font-size:13px; color:#bbb; padding:3px 0; }
    .msg-wrap { display:flex; flex-direction:column; gap:3px; }
    .msg-wrap.own { align-items:flex-end; }
    .msg-author-row { display:flex; align-items:center; gap:6px; }
    .msg-author-dot { width:15px; height:15px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; color:#fff; }
    .msg-author { font-family:'Caveat',cursive; font-size:13px; color:#bbb; }
    .msg-bubble { background:#f4f4f4; padding:8px 12px; font-size:13px; line-height:1.5; max-width:82%; }
    .msg-bubble.own { background:#111; color:#fff; }
    .msg-time { font-size:10px; color:#ccc; }
    .chat-input-row { padding:11px 13px; border-top:1.5px solid #111; display:flex; gap:7px; }
    .chat-input { flex:1; border:1px solid #ddd; padding:9px 12px; font-family:'Inter',sans-serif; font-size:13px; outline:none; }
    .chat-input:focus { border-color:#111; }
    .chat-send { background:#111; color:#fff; border:none; padding:9px 16px; font-family:'Caveat',cursive; font-size:16px; cursor:pointer; }
    .chat-send:hover { background:#333; }
    .chat-locked { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:20px; text-align:center; }
    .chat-locked p { font-family:'Caveat',cursive; font-size:17px; color:#aaa; }
    .chat-locked small { font-size:12px; color:#bbb; line-height:1.6; }

    /* ── CHECK-IN ── */
    .checkin-indicator { display:none; align-items:center; gap:7px; background:#111; color:#fff; padding:5px 13px 5px 10px; font-family:'Caveat',cursive; font-size:15px; white-space:nowrap; flex-shrink:0; }
    .checkin-indicator.visible { display:flex; }

let leftPanelOpen = true;
const isMobileView = () => window.innerWidth <= 700;
function updatePanelBtnLabel() {
  const btn = document.getElementById('panelToggleBtn');
  if (leftPanelOpen) btn.innerHTML = '<span style="font-size:11px;color:#bbb;">&#x25C0;</span>';
  else btn.innerHTML = 'Top List <span style="font-size:11px;color:#bbb;">&#x25B6;</span>';
}
function toggleLeftPanel() {
  const panel = document.getElementById('leftPanel');
  const btn   = document.getElementById('panelToggleBtn');
  const mapEl = document.getElementById('map');
  leftPanelOpen = !leftPanelOpen;
  panel.classList.toggle('hidden', !leftPanelOpen);
  if (!isMobileView()) {
    btn.classList.toggle('hidden', !leftPanelOpen);
    mapEl.classList.toggle('panel-hidden', !leftPanelOpen);
    updatePanelBtnLabel();
  } else {
    btn.innerHTML = leftPanelOpen ? '&#10005; Close' : '&#9776; Top List';
  }
}
function initPanelState() {
  const isMobile = window.innerWidth <= 700;
  if (isMobile) {
    leftPanelOpen = false;
    document.getElementById('leftPanel').classList.add('hidden');
    const btn = document.getElementById('panelToggleBtn');
    btn.classList.remove('hidden');
    btn.innerHTML = '&#9776; Top List';
  } else {
    updatePanelBtnLabel();
  }
}

// ── AUTH ──
function buildColorGrid() {
  const grid = document.getElementById('colorGrid');
  if (!grid) return;
  grid.innerHTML = '';
  COLORS.forEach((c,i) => {
    const el = document.createElement('div');
    el.className = 'color-swatch'+(i===0?' selected':'');
    el.style.background = c;
    el.onclick = () => {
      selectedColor = c;
      document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
      el.classList.add('selected');
      updateSignupPreview();
    };
    grid.appendChild(el);
  });
}
function updateSignupPreview() {
  const name = document.getElementById('signupName')?.value.trim();
  const ps = document.getElementById('previewSpoon');
  const pn = document.getElementById('previewName');
  if (ps) ps.innerHTML = spoonSVG(selectedColor, 62, true);
  if (pn) pn.textContent = name || 'waiting…';
}
function switchAuthTab(tab) {
  document.getElementById('authLoginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('authSignupForm').style.display = tab==='signup'?'block':'none';
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabSignup').classList.toggle('active', tab==='signup');
  document.getElementById('authError').classList.remove('visible');
  if (tab==='signup') { buildColorGrid(); updateSignupPreview(); }
}
function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.classList.add('visible');
}
function setAuthLoading(loading) {
  document.getElementById('loginBtn').disabled = loading;
  document.getElementById('signupBtn').disabled = loading;
}
async function loginWithEmail() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  if (!email||!pass) { showAuthError('Enter your email and password.'); return; }
  setAuthLoading(true);
  document.getElementById('authError').classList.remove('visible');
  let loggedIn = false;
  if (db) {
    try {
      const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
      if (!error && data.user) {
        const meta = data.user.user_metadata || {};
        enterApp(meta.name||email.split('@')[0], meta.color||COLORS[0]);
        loggedIn = true;
      }
    } catch(e) {}
  }
  if (!loggedIn) {
    const stored = JSON.parse(localStorage.getItem('spoon_user')||'null');
    if (stored && stored.email === email) { enterApp(stored.name, stored.color||COLORS[0]); loggedIn = true; }
    else if (stored && stored.email !== email) showAuthError('Wrong email. Try the one you signed up with, or sign up again.');
    else showAuthError('No account found. Please sign up first.');
  }
  setAuthLoading(false);
}
async function signupWithEmail() {
  const name  = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass  = document.getElementById('signupPassword').value;
  if (!name)  { showAuthError('Enter your name.'); return; }
  if (!email) { showAuthError('Enter your email.'); return; }
  if (pass.length<6) { showAuthError('Password must be at least 6 characters.'); return; }
  setAuthLoading(true);
  document.getElementById('authError').classList.remove('visible');
  let signedUp = false;
  if (db) {
    try {
      const { data, error } = await db.auth.signUp({ email, password: pass, options: { data: { name, color: selectedColor } } });
      if (!error) {
        if (data.user && !data.session) {
          showAuthError('Check your email to confirm your account, then log in!');
          setAuthLoading(false); switchAuthTab('login'); return;
        }
        signedUp = true;
      }
    } catch(e) {}
  }
  localStorage.setItem('spoon_user', JSON.stringify({ name, email, color: selectedColor }));
  enterApp(name, selectedColor);
  setAuthLoading(false);
}
async function loginWithGoogle() {
  if (!db) { showAuthError('Google login requires Supabase setup. Use email/password instead.'); return; }
  try {
    const { error } = await db.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
    if (error) throw error;
  } catch(e) { showAuthError('Google login failed: '+e.message); }
}
async function logoutUser() {
  if (db) await db.auth.signOut();
  localStorage.removeItem('spoon_user');
  currentUser = null;
  document.getElementById('userPill').style.display = 'none';
  document.getElementById('checkinIndicator').classList.remove('visible');
  document.getElementById('authOverlay').classList.add('open');
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('addPlaceFab').classList.remove('visible');
}
function enterApp(name, color) {
  currentUser = { name, color, checkedInAt:null };
  selectedColor = color;
  document.getElementById('headerSpoon').innerHTML = spoonSVG(color, 36, false);
  document.getElementById('headerName').innerHTML = name + ' <button class="logout-btn" onclick="logoutUser()" title="Log out">↩</button>';
  document.getElementById('userPill').style.display = 'flex';
  document.getElementById('authOverlay').classList.remove('open');
  document.getElementById('addPlaceFab').classList.add('visible');
}
async function checkExistingSession() {
  if (!db) {
    const stored = JSON.parse(localStorage.getItem('spoon_user') || 'null');
    if (stored && stored.name) enterApp(stored.name, stored.color || COLORS[0]);
    return;
  }
  try {
    const { data: { session } } = await db.auth.getSession();
    if (session?.user) {
      const meta = session.user.user_metadata || {};
      enterApp(meta.name||session.user.email?.split('@')[0]||'Spoon', meta.color||COLORS[0]);
      return;
    }
  } catch(e) {}
  const stored = JSON.parse(localStorage.getItem('spoon_user') || 'null');
  if (stored && stored.name) enterApp(stored.name, stored.color || COLORS[0]);
}

// ── SEARCH (Google Places AutocompleteService) ──
function onSearchInput(val, dropdownId) {
  clearTimeout(searchDebounce);
  const ddId = dropdownId || (window.innerWidth <= 700 ? 'searchDropdownMobile' : 'searchDropdown');
  const dd = document.getElementById(ddId);
  if (!dd) return;
  if (!val.trim()) { dd.classList.remove('open'); return; }

  dd.innerHTML = '<div class="search-loading">Searching…</div>';
  dd.classList.add('open');

  searchDebounce = setTimeout(async () => {
    const q = val.toLowerCase();
    const localMatches = RESTAURANTS.filter(r =>
      r.name.toLowerCase().includes(q) || r.category.toLowerCase().includes(q) || r.address.toLowerCase().includes(q)
    ).sort((a,b) => b.spoons - a.spoons);

    searchResults = [];
    let html = '';
    localMatches.forEach(r => {
      searchResults.push({ type:'local', id:r.id });
      html += `<div class="search-result" onclick="selectSearchResult(${searchResults.length-1})">
        <span class="search-result-name search-in-spoon">🥄 ${r.name}</span>
        <span class="search-result-addr">${r.address}</span>
        <span class="search-result-tag">${r.category} · ${r.spoons} spoon${r.spoons>1?'s':''}</span>
      </div>`;
    });

    try {
      const center = map ? map.getCenter() : { lat: -27.468, lng: 153.022 };
      const resp = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Goog-Api-Key': GMAPS_KEY,
          'X-Goog-FieldMask': 'suggestions.placePrediction.placeId,suggestions.placePrediction.text,suggestions.placePrediction.structuredFormat'
        },
        body: JSON.stringify({
          input: val,
          locationBias: { circle: { center: { latitude: center.lat, longitude: center.lng }, radius: 5000 } }
        })
      });
      const data = await resp.json();
      const localNames = new Set(localMatches.map(r => r.name.toLowerCase()));
      (data.suggestions || []).filter(s => s.placePrediction).slice(0, 5).forEach(s => {
        const pred = s.placePrediction;
        const name = pred.structuredFormat?.mainText?.text || pred.text?.text || '';
        const addr = pred.structuredFormat?.secondaryText?.text || '';
        if (!localNames.has(name.toLowerCase())) {
          searchResults.push({ type:'new', placeId: pred.placeId, name, addr });
          html += `<div class="search-result" onclick="selectSearchResult(${searchResults.length-1})">
            <span class="search-result-name search-new">${name}</span>
            <span class="search-result-addr">${addr}</span>
            <span class="search-result-tag search-new">Not on Spoon yet – be first!</span>
          </div>`;
        }
      });
    } catch(e) { console.warn('Places autocomplete unavailable:', e.message); }

    dd.innerHTML = html || '<div class="search-loading">No matches in Spoon yet</div>';
  }, 300);
}

async function selectSearchResult(idx) {
  const r = searchResults[idx];
  document.getElementById('searchInput').value = '';
  const _mi = document.getElementById('searchInputMobile');
  if (_mi) _mi.value = '';
  document.getElementById('searchDropdown').classList.remove('open');
  const _mdd = document.getElementById('searchDropdownMobile');
  if (_mdd) _mdd.classList.remove('open');

  if (r.type === 'local') {
    const restaurant = RESTAURANTS.find(x => x.id === r.id);
    map.setView([restaurant.lat, restaurant.lng], 16);
    openPanel(r.id);
  } else {
    try {
      const resp = await fetch(`https://places.googleapis.com/v1/${r.placeId}`, {
        headers: { 'X-Goog-Api-Key': GMAPS_KEY, 'X-Goog-FieldMask': 'location,displayName,formattedAddress' }
      });
      const place = await resp.json();
      if (place.location) {
        map.setView([place.location.latitude, place.location.longitude], 17);
        openNewPlacePanel({ name: r.name, addr: r.addr, lat: place.location.latitude, lng: place.location.longitude, placeId: r.placeId });
      }
    } catch(e) {}
  }
}

function hideDropdownDelayed(ddId) {
  setTimeout(() => {
    const id = ddId || 'searchDropdown';
    document.getElementById(id)?.classList.remove('open');
    document.getElementById('searchDropdownMobile')?.classList.remove('open');
  }, 200);
}
function searchKeydown(e, ddId) {
  if (e.key === 'Escape') hideDropdownDelayed(ddId);
}

// ── CATEGORY BAR ──
let selectedCategory = 'all';
let gPlacesMarkers = [];
let categoryDebounce = null;

// Keyword lists for filtering local RESTAURANTS by category chip
const CATEGORY_MATCH = {
  all:         null,
  cafe:        ['café','cafe','coffee','brunch','bakery'],
  asian:       ['japanese','asian','chinese','thai','korean','vietnamese','ramen','sushi','indian'],
  sushi:       ['japanese','sushi'],
  korean:      ['korean'],
  pasta:       ['italian','pasta'],
  pizza:       ['italian','pizza'],
  burgers:     ['burger','american','bbq'],
  sandwiches:  ['sandwich','deli','sub'],
  brunch:      ['brunch','breakfast','café','cafe'],
  mexican:     ['mexican','taco','latin'],
  bakery:      ['bakery','pastry','patisserie'],
  bar:         ['bar','pub','wine','cocktail','bistro'],
  bubble:      ['bubble','boba','taiwanese'],
  healthy:     ['healthy','salad','bowl','vegan','vegetarian'],
};

function restaurantMatchesCategory(r, catId) {
  if (catId === 'all') return true;
  const keywords = CATEGORY_MATCH[catId];
  if (!keywords) return true;
  const cat = (r.category || '').toLowerCase();
  return keywords.some(k => cat.includes(k));
}

function filterLocalMarkers() {
  Object.entries(mapMarkers).forEach(([id, entry]) => {
    const r = RESTAURANTS.find(x => x.id == id);
    if (!r || !entry || !entry.marker) return;
    const show = restaurantMatchesCategory(r, selectedCategory);
    if (show) {
      if (!map.hasLayer(entry.marker)) entry.marker.addTo(map);
    } else {
      if (map.hasLayer(entry.marker)) entry.marker.remove();
    }
  });
}

function renderCategoryBar() {
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-chip${c.id===selectedCategory?' active':''}" data-id="${c.id}" onclick="selectCategory('${c.id}')">${c.label}</button>`
  ).join('');
}

function selectCategory(id) {
  selectedCategory = id;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  filterLocalMarkers();
  loadPlacesByCategory();
}

function clearGPlacesMarkers() {
  gPlacesMarkers.forEach(m => { m.remove(); });
  gPlacesMarkers = [];
}

async function loadPlacesByCategory() {
  if (!map) return;
  clearGPlacesMarkers();
  const cat = CATEGORIES.find(c => c.id === selectedCategory);
  if (!cat || cat.id === 'all') return;
  try {
    const center = map.getCenter();
    const typeMap = { cafe:'cafe', bakery:'bakery', bar:'bar', bubble:'cafe' };
    const placeType = typeMap[cat.id] || 'restaurant';
    const resp = await fetch('https://places.googleapis.com/v1/places:searchNearby', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': GMAPS_KEY,
        'X-Goog-FieldMask': 'places.id,places.displayName,places.location,places.rating,places.userRatingCount'
      },
      body: JSON.stringify({
        includedTypes: [placeType],
        maxResultCount: 20,
        locationRestriction: { circle: { center: { latitude: center.lat, longitude: center.lng }, radius: 2000 } }
      })
    });
    const data = await resp.json();
    const spoonNames = new Set(RESTAURANTS.map(r => r.name.toLowerCase()));
    (data.places || []).forEach(place => {
      const name = place.displayName?.text || '';
      if (spoonNames.has(name.toLowerCase()) || !place.location) return;
      const rating = place.rating ? ` ⭐${place.rating}` : '';
      const icon = L.divIcon({
        className: '',
        html: `<div class="marker-wrap"><div class="marker-label gplace-label">${name}${rating}</div></div>`,
        iconSize: null, iconAnchor: [0, 0]
      });
      const marker = L.marker([place.location.latitude, place.location.longitude], { icon });
      marker.addTo(map);
      marker.on('click', () => openGPlacePanel(place));
      gPlacesMarkers.push(marker);
    });
  } catch(e) { console.log('Places search error:', e.message); }
}

// ── MAP ──
let map, placesService, mapMarkers = {};

function initMap() {
  if (typeof supabase !== 'undefined') {
    try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) { db = null; }
  }
  checkExistingSession();
  renderRankings();
  renderCategoryBar();
  initPanelState();

  map = L.map('map', { zoomControl: false }).setView([-27.468, 153.022], 14);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: ''
  }).addTo(map);

  RESTAURANTS.forEach(r => addMarker(r));

  let idleTimeout = null;
  map.on('moveend', () => {
    clearTimeout(idleTimeout);
    idleTimeout = setTimeout(loadPlacesByCategory, 600);
  });
}

function makeMarkerHTML(r, isActive) {
  const active = getActiveHere(r.id);
  const countBadge = active.length ? `<span class="active-count-badge">${active.length}🥄</span>` : '';
  const avatarsHtml = active.length
    ? '<div class="marker-avatars">'+active.map(u=>`<div class="avatar-dot" style="background:${u.color}">${u.name[0].toUpperCase()}</div>`).join('')+'</div>'
    : '';
  return `<div class="marker-wrap">
    <div class="marker-label${isActive?' active':''}"> ${r.name}${countBadge}</div>
    <div class="marker-spoons-row">${spoonRow(r.spoons,18)}</div>
    ${avatarsHtml}
  </div>`;
}

function addMarker(r) {
  const el = document.createElement('div');
  el.innerHTML = makeMarkerHTML(r, false);
  const icon = L.divIcon({ className: '', html: el.innerHTML, iconSize: null, iconAnchor: [0, 0] });
  const marker = L.marker([r.lat, r.lng], { icon });
  marker.addTo(map);
  marker.on('click', () => openPanel(r.id));
  mapMarkers[r.id] = { marker };
}

function refreshMarker(id) {
  const r = RESTAURANTS.find(x => x.id === id);
  if (r && mapMarkers[id]) {
    const icon = L.divIcon({ className: '', html: makeMarkerHTML(r, activePanelId === id), iconSize: null, iconAnchor: [0, 0] });
    mapMarkers[id].marker.setIcon(icon);
    mapMarkers[id].marker.off('click').on('click', () => openPanel(r.id));
  }
}

function getActiveHere(id) {
  const mock = MOCK_ACTIVE[id]||[];
  if (currentUser && currentUser.checkedInAt===id) return [...mock,{name:currentUser.name,color:currentUser.color}];
  return mock;
}

// ── SIDE PANEL ──
function openPanel(id) {
  if (activePanelId) refreshMarker(activePanelId);
  activePanelId = id;
  refreshMarker(id);
  renderRankings();
  document.getElementById('panelContent').innerHTML = renderPanel(id);
  document.getElementById('sidePanel').classList.add('open');
  setTimeout(() => loadPanelPhoto(id), 100);
}
function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  if (activePanelId) { refreshMarker(activePanelId); activePanelId = null; }
  renderRankings();
}

function renderPanel(id) {
  const r = RESTAURANTS.find(x=>x.id===id);
  const checkedHere  = currentUser && currentUser.checkedInAt===id;
  const checkedElsew = currentUser && currentUser.checkedInAt && !checkedHere;
  const active = getActiveHere(id);

  const whoHtml = active.length
    ? `<div class="whos-here"><div class="whos-here-avatars">${active.map(u=>`<div class="avatar-dot" style="background:${u.color}">${u.name[0].toUpperCase()}</div>`).join('')}</div><span>${active.length} Spoon${active.length>1?'s':''} here right now</span></div>`
    : `<div class="whos-here"><span style="color:#ddd">No Spoons checked in yet — be first!</span></div>`;

  let spoonBtn = '';
  if (currentUser) {
    if (checkedHere) spoonBtn = `<button class="spoon-in-btn checked-in" onclick="spoonOut()">Spoon out — leaving ${r.name}</button>`;
    else if (checkedElsew) {
      const el = RESTAURANTS.find(x=>x.id===currentUser.checkedInAt);
      spoonBtn = `<button class="spoon-in-btn elsewhere">Spoon in</button>
        <div class="elsewhere-note">You're at ${el.name}. <span onclick="spoonOut();openPanel(${id})">Spoon out first →</span></div>`;
    } else spoonBtn = `<button class="spoon-in-btn" onclick="spoonIn(${id})">Spoon in 🥄</button>`;
  }

  const reviewsHtml = r.reviews.map(rv=>`
    <div class="review-item">
      <div class="review-top"><span class="review-author">${rv.author}</span><span style="display:flex;gap:1px">${spoonRow(rv.spoons,13,'#111')}</span></div>
      ${rv.tags?`<div class="review-tags">${rv.tags.map(t=>`<span class="review-tag">${t}</span>`).join('')}</div>`:''}
      <div class="review-text">${rv.text}</div>
      ${rv.mustOrder?`<div class="review-must">Must order: <strong>${rv.mustOrder}</strong></div>`:''}
      <div class="review-date">${rv.date} · ${rv.back||''}</div>
    </div>`).join('');

  const userReview = currentUser ? r.reviews.find(rv=>rv.author===currentUser.name) : null;
  const reviewFormHtml = currentUser && !userReview ? `
    <div class="panel-review-section">
      <div class="section-label">Leave your review</div>
      <div class="rate-form" id="panelReviewForm_${id}">
        <div>
          <label class="form-label">Spoon rating</label>
          <div class="spoon-picker-row" id="panelSpoonRow_${id}">
            ${[1,2,3,4,5].map(i=>`<button class="spoon-pick-btn" onclick="pickPanelSpoons(${i},${id})">${spoonSVG('#111',26,false)}</button>`).join('')}
            <span class="spoon-rating-desc" id="panelSpoonDesc_${id}">tap to rate</span>
          </div>
        </div>
        <div>
          <label class="form-label">Your take</label>
          <textarea class="form-textarea" id="panelReviewText_${id}" placeholder="What made it worth visiting?"></textarea>
        </div>
        <div>
          <label class="form-label">Must order</label>
          <input class="form-input" id="panelMust_${id}" placeholder="The thing everyone has to get…"/>
        </div>
        <div>
          <label class="form-label">The vibe</label>
          <div class="chips" id="panelVibeChips_${id}">${['Cosy','Buzzy','Fancy','Hidden gem','Romantic','Lively'].map(t=>`<div class="chip" onclick="toggleChip(this,'panelVibe')">${t}</div>`).join('')}</div>
        </div>
        <button class="btn-submit" onclick="submitPanelReview(${id})">Drop your review 🥄</button>
      </div>
    </div>` : userReview ? `<div class="already-reviewed">You've reviewed this spot ✓</div>` : '';

  return `
    <div class="panel-category">${r.category}</div>
    <div class="panel-name">${r.name}</div>
    <div class="panel-address">${r.address}</div>
    <div class="panel-rating-row">
      <span style="display:flex;gap:2px">${spoonRow(r.spoons,21,'#111')}</span>
      <span class="rating-meta">${r.totalRatings} Spoons rated</span>
    </div>
    <div class="panel-photo" id="panelPhoto_${r.id}" style="padding:0;overflow:hidden;position:relative;">
      <img id="panelPhotoImg_${r.id}" src="" alt="${r.name}"
        style="width:100%;height:100%;object-fit:cover;display:none;"
        onerror="this.style.display='none';document.getElementById('panelPhotoFallback_${r.id}').style.display='flex';" />
      <div id="panelPhotoFallback_${r.id}" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:#ccc;">
        <span style="font-size:28px">📸</span>
        <span style="font-size:13px">Loading photo…</span>
      </div>
    </div>
    ${whoHtml}
    ${spoonBtn}
    <button class="chat-btn" onclick="openChatModal(${r.id})">Chat with Spoons <div class="live-badge"><div class="live-dot"></div>LIVE</div></button>
    <div class="section-label">What Spoons are saying</div>
    ${reviewsHtml}
    ${reviewFormHtml}`;
}

// ── SPOON IN / OUT ──
function spoonIn(id) {
  if (!currentUser) return;
  currentUser.checkedInAt = id;
  const r = RESTAURANTS.find(x=>x.id===id);
  document.getElementById('headerLoc').textContent = '📍 '+r.name;
  document.getElementById('checkinText').textContent = r.name;
  document.getElementById('checkinIndicator').classList.add('visible');
  refreshMarker(id);
  openPanel(id);
  openChatModal(id);
  toast(`You're in at ${r.name} 🥄`);
}
function spoonOut() {
  if (!currentUser||!currentUser.checkedInAt) return;
  openReviewModal(currentUser.checkedInAt);
}
function completeSpoonOut() {
  if (!currentUser || !currentUser.checkedInAt) return;
  const prev = currentUser.checkedInAt;
  currentUser.checkedInAt = null;
  document.getElementById('headerLoc').textContent = 'not checked in';
  document.getElementById('checkinIndicator').classList.remove('visible');
  refreshMarker(prev);
  if (activePanelId===prev) openPanel(prev);
}

// ── REVIEW MODAL ──
let reviewModalTargetId = null;
let reviewSelectedSpoons = 0;

function openReviewModal(id) {
  reviewModalTargetId = id;
  reviewSelectedSpoons = 0;
  const r = RESTAURANTS.find(x=>x.id===id);
  document.getElementById('reviewModalTitle').textContent = `How was ${r.name}? 🥄`;
  document.getElementById('reviewModalForm').innerHTML = `
    <div>
      <label class="form-label">Spoon rating</label>
      <div class="spoon-picker-row" id="reviewSpoonRow">
        ${[1,2,3,4,5].map(i=>`<button class="spoon-pick-btn" onclick="pickReviewSpoons(${i})">${spoonSVG('#111',26,false)}</button>`).join('')}
        <span class="spoon-rating-desc" id="reviewSpoonDesc">tap to rate</span>
      </div>
    </div>
    <div><label class="form-label">Your take</label><textarea class="form-textarea" id="reviewText" placeholder="What made it worth visiting? Be real."></textarea></div>
    <div><label class="form-label">Must order</label><input class="form-input" id="reviewMust" placeholder="The dish everyone has to get…"/></div>
    <div><label class="form-label">Worth the wait?</label><div class="chips" id="reviewWaitChips">${['Zero queue','Moved fast','Painful but worth it','Never again'].map(t=>`<div class="chip" onclick="toggleChip(this,'reviewWait')">${t}</div>`).join('')}</div></div>
    <div><label class="form-label">Wallet check</label><div class="chips" id="reviewWalletChips">${['Steal 🤑','Fair','Felt it','Ouch 💸'].map(t=>`<div class="chip" onclick="toggleChip(this,'reviewWallet')">${t}</div>`).join('')}</div></div>
    <div><label class="form-label">The vibe</label><div class="chips" id="reviewVibeChips">${['Cosy','Buzzy','Fancy','Hidden gem','Romantic','Lively'].map(t=>`<div class="chip" onclick="toggleChip(this,'reviewVibe')">${t}</div>`).join('')}</div></div>
    <div><label class="form-label">Coming back?</label><div class="chips" id="reviewBackChips">${['Already booked','Definitely','Maybe','Never again'].map(t=>`<div class="chip" onclick="toggleChip(this,'reviewBack')">${t}</div>`).join('')}</div></div>
    <button class="btn-submit" onclick="submitSpoonOutReview()">Drop your review 🥄</button>
    <button class="review-skip" onclick="skipReview()">Skip — just check out</button>
  `;
  document.getElementById('reviewOverlay').classList.add('open');
}
function closeReviewModal() { document.getElementById('reviewOverlay').classList.remove('open'); }
function pickReviewSpoons(n) {
  reviewSelectedSpoons = n;
  document.querySelectorAll('#reviewSpoonRow .spoon-pick-btn').forEach((b,i)=>b.classList.toggle('lit',i<n));
  document.getElementById('reviewSpoonDesc').textContent = SPOON_DESCS[n];
}
function submitSpoonOutReview() {
  const r = RESTAURANTS.find(x=>x.id===reviewModalTargetId);
  if (r) {
    const text = document.getElementById('reviewText').value.trim();
    const must = document.getElementById('reviewMust').value.trim();
    const waitChip = document.querySelector('#reviewWaitChips .chip.selected');
    const walletChip = document.querySelector('#reviewWalletChips .chip.selected');
    const vibeChips = [...document.querySelectorAll('#reviewVibeChips .chip.selected')].map(c=>c.textContent);
    const backChip = document.querySelector('#reviewBackChips .chip.selected');
    if (reviewSelectedSpoons > 0 || text) {
      const tags = [waitChip?.textContent, walletChip?.textContent, ...vibeChips].filter(Boolean);
      r.reviews.unshift({ author: currentUser.name, spoons: reviewSelectedSpoonr||3, text: text||'Was here!', tags, mustOrder: must||undefined, back: backChip?.textContent, date: 'Just now' });
      if (reviewSelectedSpoons > 0) {
        const newTotal = r.totalRatings + 1;
        r.spoons = Math.round((r.spoons * r.totalRatings + reviewSelectedSpoons) / newTotal);
        r.totalRatings = newTotal;
      }
      r.daily++; r.weekly++; r.monthly++;
      toast(`Review dropped for ${r.name} 🥄`);
    }
  }
  closeReviewModal();
  completeSpoonOut();
}
function skipReview() { closeReviewModal(); completeSpoonOut(); }

// ── PANEL INLINE REVIEW ──
let panelSelectedSpoons = {};
function pickPanelSpoons(n, id) {
  panelSelectedSpoons[id] = n;
  document.querySelectorAll(`#panelSpoonRow_${id} .spoon-pick-btn`).forEach((b,i)=>b.classList.toggle('lit',i<n));
  document.getElementById(`panelSpoonDesc_${id}`).textContent = SPOON_DESCS[n];
}
function submitPanelReview(id) {
  const r = RESTAURANTS.find(x=>x.id===id);
  if (!r || !currentUser) return;
  const spoons = panelSelectedSpoons[id] || 3;
  const text = document.getElementById(`panelReviewText_${id}`)?.value.trim() || 'Was here!';
  const must = document.getElementById(`panelMust_${id}`)?.value.trim();
  const vibeChips = [...(document.querySelectorAll(`#panelVibeChips_${id} .chip.selected`)||[])].map(c=>c.textContent);
  r.reviews.unshift({ author: currentUser.name, spoons, text, tags: vibeChips, mustOrder: must||undefined, date: 'Just now' });
  const newTotal = r.totalRatings + 1;
  r.spoons = Math.round((r.spoons * r.totalRatings + spoons) / newTotal);
  r.totalRatings = newTotal;
  delete panelSelectedSpoons[id];
  refreshMarker(id);
  openPanel(id);
  toast('Review dropped! 🥄');
}

// ── CHAT MODAL ──
function openChatModal(id) {
  const r = RESTAURANTS.find(x=>x.id===id);
  const checkedHere = currentUser && currentUser.checkedInAt===id;
  const active = getActiveHere(id);
  document.getElementById('chatPlaceName').textContent = r.name;
  document.getElementById('chatMeta').textContent = active.length ? `${active.length} Spoon${active.length>1?'s':''} here now` : 'No Spoons checked in yet';
  const body = document.getElementById('chatBody');
  if (checkedHere) {
    body.innerHTML = `
      <div class="chat-messages" id="chatMessages">
        ${r.chats.map(m=>`<div class="msg-wrap"><div class="msg-author-row"><div class="msg-author-dot" style="background:${m.color}">${m.author[0]}</div><span class="msg-author">${m.author}</span></div><div class="msg-bubble">${m.text}</div><span class="msg-time">${m.time}</span></div>`).join('')}
        <div class="msg-system">You Spooned in 🥄 Ask away!</div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="Ask the Spoons anything…" onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="chat-send" onclick="sendMsg()">Send</button>
      </div>`;
    document.getElementById('chatMessages').scrollTop = 99999;
  } else {
    body.innerHTML = `<div class="chat-locked">
      <div style="display:flex;gap:3px">${spoonRow(3,34,'#eee')}</div>
      <p>Spoon in to join the chat</p>
      <small>You need to be at <strong>${r.name}</strong><br>to chat with the Spoons here.</small><br>
      ${currentUser?(currentUser.checkedInAt
        ?`<button class="btn-submit" style="width:auto;padding:10px 20px;font-size:15px" onclick="spoonOut();spoonIn(${id})">Switch here 🥄</button>`
        :`<button class="btn-submit" style="width:auto;padding:10px 20px;font-size:15px" onclick="closeChatModal();spoonIn(${id})">Spoon in 🥄</button>`):''}
    </div>`;
  }
  document.getElementById('chatOverlay').classList.add('open');
}
function closeChatModal() { document.getElementById('chatOverlay').classList.remove('open'); }
function chatBgClick(e) { if (e.target===document.getElementById('chatOverlay')) closeChatModal(); }
function sendMsg() {
  const inp = document.getElementById('chatInput');
  const txt = inp.value.trim(); if (!txt) return;
  const now=new Date(); const time=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  const el=document.getElementById('chatMessages');
  el.innerHTML+=`<div class="msg-wrap own"><div class="msg-bubble own">${txt}</div><span class="msg-time">${time}</span></div>`;
  inp.value=''; el.scrollTop=99999;
}

// ── ADD PLACE MODAL ──
et apSelectedCategory = '';
let apSelectedSpoons = 0;

function openAddPlaceModal() {
  if (!currentUser) { document.getElementById('authOverlay').classList.add('open'); return; }
  document.getElementById('addPlaceOverlay').classList.add('open');
  apSelectedCategory = ''; apSelectedSpoons = 0;
  window._prefillLat = null; window._prefillLng = null;
  renderAddPlaceForm();
}
function closeAddPlaceModal() { document.getElementById('addPlaceOverlay').classList.remove('open'); }
function addPlaceBgClick(e) { if (e.target === document.getElementById('addPlaceOverlay')) closeAddPlaceModal(); }

function renderAddPlaceForm() {
  const categories = ['Café','Brunch','Japanese','Korean','Italian','French','Thai',3'Chinese','Greek','Asian Fusion','Pizza','Bakery','Burgers','Sandwiches','Seafood','Indian','Mexican','Bar','Bistro'];
  document.getElementById('addPlaceFormContent').innerHTML = `
    <div class="rate-form">
      <div>
        <label class="form-label">Restaurant / Café name *</label>
        <input class="form-input" id="apName" placeholder="e.g. Taro's Ramen" autofocus/>
      </div>
      <div>
        <label class="form-label">Category</label>
        <div class="chips" id="apCategoryChips" style="margin-bottom:8px;">
          ${categories.map(t=>`<div class="chip" onclick="selectApCategory(this,'${t}')">${t}</div>`).join('')}
        </div>
        <input class="form-input" id="apCategoryCustom" placeholder="Or type a custom category…" oninput="apSelectedCategory=this.value;document.querySelectorAll('#apCategoryChips .chip').forEach(c=>c.classList.remove('selected'))"/>
      </div>
      <div>
        <label class="form-label">Address *</label>
        <input class="form-input" id="apAddress" placeholder="e.g. 111 Mary St, Brisbane City"/>
        <div style="font-size:11px;color:#aaa;margin-top:4px;">We'll pin it on the map automatically.</div>
      </div>
      <div>
        <label class="form-label">Your Spoon rating</label>
        <div class="spoon-picker-row" id="apSpoonRow">
          ${[1,2,3,4,5].map(i=>`<button class="spoon-pick-btn" onclick="pickApSpoons(${i})">${spoonSVG('#111',26,false)}</button>`).join('')}
          <span class="spoon-rating-desc" id="apSpoonDesc">tap to rate</span>
        </div>
      </div>
      <div><label class="form-label">Your take (optional)</label><textarea class="form-textarea" id="apReview" placeholder="What made it worth visiting?"></textarea></div>
      <div><label class="form-label">Must order (optional)</label><input class="form-input" id="apMust" placeholder="The dish everyone has to try…"/></div>
      <button class="btn-submit" id="apSubmitBtn" onclick="submitAddPlace()">Add to Spoon 🥄</button>
    </div>`;
}
function selectApCategory(el, cat) {
  document.querySelectorAll('#apCategoryChips .chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected'); apSelectedCategory = cat;
  document.getElementById('apCategoryCustom').value = '';
}
function pickApSpoons(n) {
  apSelectedSpoons = n;
  document.querySelectorAll('#apSpoonRow .spoon-pick-btn').forEach((b,i)=>b.classList.toggle('lit',i<n));
  document.getElementById('apSpoonDesc').textContent = SPOON_DESCS[n];
}
async function submitAddPlace() {
  const name    = (document.getElementById('apName')?.value||'').trim();
  const address = (document.getElementById('apAddress')?.value||'').trim();
  const review  = (document.getElementById('apReview')?.value||'').trim();
  const must    = (document.getElementById('apMust')?.value||'').trim();
  const customCat = (document.getElementById('apCategoryCustom')?.value||'').trim();
  const category = customCat || apSelectedCategory || 'Restaurant';
  const spoons  = apSelectedSpoons || 3;
  if (!name)    { toast('Please enter the restaurant name 👇'); return; }
  if (!address) { toast('Please enter the address 👇'); return; }

  const btn = document.getElementById('apSubmitBtn');
  btn.textContent = 'Pinning on map…'; btn.disabled = true;

  // Use prefilled coords if available, else geocode via Google
  let lat = window._prefillLat || -27.468;
  let lng = window._prefillLng || 153.022;

  if (!window._prefillLat && map) {
    try {
      const resp = await fetch(`https://places.googleapis.com/v1/places:autocomplete`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': GMAPS_KEY,
          'X-Goog-FieldMask': 'suggestions.placePrediction.placeId' },
        body: JSON.stringify({ input: name + ' ' + address })
      });
      const data = await resp.json();
      const placeId = data.suggestions?.[0]?.placePrediction?.placeId;
      if (placeId) {
        const det = await fetch(`https://places.googleapis.com/v1/${placeId}`, {
          headers: { 'X-Goog-Api-Key': GMAPS_KEY, 'X-Goog-FieldMask': 'location' }
        }).then(r=>r.json());
        if (det.location) { lat = det.location.latitude; lng = det.location.longitude; }
      }
    } catch(e) {}
  }

  const newId = Date.now();
  const newR = {
    id: newId, name, category,
    address: address,
    lat, lng, spoons,
    totalRatings: 1, daily:1, weekly:1, monthly:1,
    reviews: currentUser ? [{ author: currentUser.name, spoons, text: review || 'First Spoon here!', tags: [], mustOrder: must||undefined, date: 'Just now' }] : [],
    chats: []
  };
  RESTAURANTS.push(newR);
  addMarker(newR);
  renderRankings();
  apSelectedSpoons = 0; apSelectedCategory = '';
  window._prefillLat = null; window._prefillLng = null;
  closeAddPlaceModal();
  map.setView([lat, lng], 16);
  toast(`"${name}" is on Spoon now! 🥄`);
  setTimeout(() => openPanel(newId), 350);
}

// ── MISC ──
function toggleChip(el, group) {
  if (group==='npVibe' || group==='reviewVibe' || group==='panelVibe') { el.classList.toggle('selected'); return; }
  el.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}
function toast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.innerHTML=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

(function() {
  try {
    const stored = JSON.parse(localStorage.getItem('spoon_user') || 'null');
    if (stored && stored.name) document.getElementById('authOverlay').classList.remove('open');
  } catch(e) {}
})();

// ── PHOTO LOADING ──
const CATEGORY_PHOTO_TAGS = {
  'japanese':'ramen,japanese,noodles','korean':'korean,bibimbap','chinese':'chinese,dimsum',
  'thai':'thai,thaicurry','italian':'italian,pasta,pizza','french':'french,bistro',
  'greek':'greek,souvlaki','mexican':'mexican,tacos','indian':'indian,curry',
  'brunch':'brunch,eggs,avocado','bakery':'bakery,croissant,pastry',
  'café':'coffee,cafe,latte','cafe':'coffee,cafe,latte','asian fusion':'asian,fusion,food',
  'pizza':'pizza,woodfired','burgers':'burger,brioche','seafood':'seafood,fish',
  'bar':'cocktail,bar,drinks','sandwiches':'sandwich,deli',
};
async function loadPanelPhoto(restaurantId) {
  const r = RESTAURANTS.find(x=>x.id===restaurantId);
  if (!r) return;
  const img = document.getElementById('panelPhotoImg_' + restaurantId);
  const fallback = document.getElementById('panelPhotoFallback_' + restaurantId);
  if (!img) return;
  if (r.photoUrl) { img.src = r.photoUrl; img.style.display = 'block'; if (fallback) fallback.style.display = 'none'; return; }
  const catKey = (r.category||'').toLowerCase();
  const tags = CATEGORY_PHOTO_TAGS[catKey] || 'restaurant,food';
  const seed = Math.abs(r.id || r.name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)) % 1000;
  const photoUrl = 'https://source.unsplash.com/800x320/?' + encodeURIComponent(tags) + '&sig=' + seed;
  r.photoUrl = photoUrl;
  img.src = photoUrl; img.style.display = 'block';
  if (fallback) fallback.style.display = 'none';
}
